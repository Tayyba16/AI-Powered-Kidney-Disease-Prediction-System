<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CKD Prediction - Input</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: url('https://images.unsplash.com/photo-1588776814546-ec7d2e1b4b1b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', sans-serif;
      color: #333333;
      animation: fadeIn 1.2s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-wrapper {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.15);
      margin-top: 30px;
    }

    h2 {
      font-weight: 700;
      color: #1f1f1f;
      text-shadow: 0 1px 1px rgba(255, 255, 255, 0.6);
    }

    .form-label {
      font-weight: 600;
      position: relative;
    }

    .form-label::after {
      font-size: 14px;
      color: #6c757d;
      cursor: help;
      position: absolute;
      right: -18px;
      top: 0;
    }

    .form-control {
      border-radius: 12px;
      padding: 10px 15px;
      font-size: 1rem;
      border: 1px solid #d3ceda;
      transition: 0.3s ease-in-out;
    }

    .form-control:focus {
      border-color: #4a00e0;
      box-shadow: 0 0 0 0.2rem rgba(74, 0, 224, 0.15);
    }

    .btn-custom {
      padding: 12px 40px;
      font-weight: 600;
      font-size: 1.05rem;
      border-radius: 50px;
      transition: all 0.4s ease;
    }

    .btn-primary {
      background-color: #4a00e0;
      border: none;
    }

    .btn-primary:hover {
      background-color: #3700b3;
      transform: scale(1.05);
    }

    .btn-secondary {
      background-color: #2f2f2f;
      border: none;
    }

    .btn-secondary:hover {
      background-color: #1b1b1b;
      transform: scale(1.05);
    }

    input[type="file"]::file-selector-button {
      background-color: #4a00e0;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      margin-right: 15px;
      cursor: pointer;
    }

    input[type="file"]::file-selector-button:hover {
      background-color: #3700b3;
    }

    .divider {
      border-top: 2px dashed #ccc;
      margin: 60px 0;
    }

    @media (max-width: 768px) {
      .form-wrapper {
        padding: 30px 20px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h2 class="text-center mt-5 mb-4">🩺 Enter Patient Data Manually</h2>

    <form action="/predict-manual" method="POST">
      <div class="row g-3 form-wrapper">
        {% for feature in features %}
        <div class="col-md-4 col-sm-6">
          <label class="form-label" title="Enter value for {{ feature.replace('_', ' ').capitalize() }}">
            {{ feature.replace("_", " ").capitalize() }}
          </label>
          <input type="number" step="any" name="{{ feature }}" class="form-control" required>
        </div>
        {% endfor %}
        <div class="col-12 text-center mt-4">
          <button type="submit" class="btn btn-primary btn-custom">🔍 Predict Manually</button>
        </div>
      </div>
    </form>

    <div class="divider"></div>

    <h2 class="text-center mb-4">📁 Or Upload File (.csv or .xlsx)</h2>
    <form action="/predict-file" method="POST" enctype="multipart/form-data">
      <div class="form-wrapper text-center">
        <input type="file" name="file" accept=".csv, .xlsx" class="form-control mb-4" required>
        <button type="submit" class="btn btn-secondary btn-custom">⏫ Upload & Predict</button>
      </div>
    </form>
  </div>
</body>
</html>
