<!DOCTYPE html>
<html>
<head>
    <title>CKD Prediction Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 text-center">
    <h2 class="mb-4">CKD Prediction Result</h2>

    <div class="card shadow-sm p-4">
        <h3 class="text-primary">{{ message }} {{ emoji }}</h3>

        {% if pred_ckd == 1 %}
            <p class="mt-3 text-danger fw-bold fs-5">{{ stage_text }}</p>
        {% endif %}

        <hr>
        <p class="text-muted">Binary Model Accuracy: <strong>{{ accuracy_bin * 100 }}%</strong></p>
        <p class="text-muted">Multiclass Model Accuracy: <strong>{{ accuracy_multi * 100 }}%</strong></p>
    </div>

    <a href="/predict" class="btn btn-outline-primary mt-4">Predict Another</a>
</div>
</body>
</html>
